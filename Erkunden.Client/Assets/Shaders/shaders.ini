; Basic Phong Shader
[Phong]
vert = ./phong.vert
frag = ./phong.frag

; Basic Phong Shader with DepthTest OFF
[Flat]
vert = ./basic.vert
frag = ./flat.frag
depth = off

; Simple Texture only shader for use with UI drawing
[Sprite]
vert = ./sprite.vert
frag = ./sprite.frag
depth = off

; Simple solid colour wireframe shader that only draws wireframes
[WireFrame]
vert = ./basic.vert
frag = ./wireframe.frag
poly = line
